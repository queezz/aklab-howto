site_name: AK Lab How-To
docs_dir: docs

theme:
  name: material
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - navigation.tabs # put top-level pages in tabs
    - content.image.zoom
  palette:
    - scheme: bh-dark
      primary: custom
      accent: yellow
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: amber
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
plugins:
  - search
  - glightbox  
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:   # for LaTeX
      generic: true  
  - mdx_truly_sane_lists:
      nested_indent: 4
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
# MARK: EXTRA
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
extra_css:
  - styles/brand.css
  - styles/extra.css

# Top-right repo link
repo_url: https://github.com/queezz/aklab-howto
repo_name: queezz/aklab-howto

# MARK: NAV
nav:
  - Home:
      - 🧭 Overview: index.md
      - 🧰 Software & tools: other-tools.md

  - 💻 Python Dev:
      - ⚙️ Scaffold: software/scaffold.md
      - 🐙 Git:
          - 📘 Intro: software/git/intro.md
          - ✍️ Commits: software/git/commits.md
          - 🏷️ Versioning: software/git/versioning.md
      - 📦 PyPackage: software/pypackage.md
      - 🐍 Virtual Environments: 
          - about: software/venv.md
          - troubles: software/venv-troubles.md
          - 🎼 Poetry: software/poetry.md
      - 🌐 Flask Server: software/pihti-vacuum.md
      - 🔁 Workflows: software/workflows.md

  - 🛠️ Hardware:
      - Equipment:
          - 🔥 TIG Welder: hardware/equipment/tig-welder.md
          - 🔌 Kikusui PWR401L: hardware/equipment/kikusui-pwr.md
          - 📈 Ulvac QMS: hardware/equipment/ulvac-qms.md
      - 🧩 KiCad: hardware/KiCad.md
      - Control Unit:
          - ℹ️ About: hardware/controlunit/control-unit.md
          - 🎚️ Waveshare AD/DA: hardware/controlunit/high-precision-adda-board.md
          - 📊 Y-corp ADC: hardware/controlunit/y-corp-adc-board.md
          - 🔌 FT232H GPIO: hardware/controlunit/ft232h-usb-gpio.md
      - Sensors:
          - WCS1800: hardware/sensors/wcs1800.md
          - ACS712: hardware/sensors/acs712.md
      - 🧷 RasPi Pinouts: hardware/RasPi-pinout.md
      - 🔬 Instruments: hardware/instruments.md
      - 🦺 Safety: hardware/safety.md

  - 🎓 Seminar:
      - Echelle spectra: seminar/echelle-spectra.md
